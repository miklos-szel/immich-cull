name: ImmichCull
options:
  bundleIdPrefix: com.local
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CODE_SIGN_IDENTITY: "Apple Development"
    CODE_SIGNING_ALLOWED: "YES"
targets:
  ImmichCull:
    type: application
    platform: iOS
    sources:
      - ImmichCull
    info:
      path: ImmichCull/Info.plist
      properties:
        CFBundleDisplayName: immich-cull
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSLocalNetworkUsageDescription: ImmichCull scans your local network to find Immich servers.
        NSPhotoLibraryUsageDescription: ImmichCull can remove photos you trash from this iPhone's photo library.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.local.ImmichCull
        INFOPLIST_KEY_UIUserInterfaceStyle: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets:
        - ImmichCullUITests
  ImmichCullMac:
    type: application
    platform: macOS
    sources:
      - ImmichCullMac
      - path: ImmichCull/Models
      - path: ImmichCull/Networking
      - path: ImmichCull/Services
        excludes:
          - BlurAnalyzer.swift
          - BlurScanSession.swift
          - ScreenshotDetector.swift
    info:
      path: ImmichCullMac/Info.plist
      properties:
        CFBundleDisplayName: immich-cull
        LSApplicationCategoryType: public.app-category.photography
        NSPhotoLibraryUsageDescription: immich-cull removes photos you trash from this Mac's Photos library.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    entitlements:
      path: ImmichCullMac/ImmichCullMac.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.personal-information.photos-library: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.local.ImmichCullMac
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        COMBINE_HIDPI_IMAGES: YES
  ImmichCullUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - ImmichCullUITests
    dependencies:
      - target: ImmichCull
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.local.ImmichCullUITests
        TEST_TARGET_NAME: ImmichCull
        GENERATE_INFOPLIST_FILE: YES
